<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Pi Approximation</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 80%;
            max-width: 600px;
        }
        h1 { color: #00e676; margin-bottom: 5px; }
        .pi-value {
            font-size: 4em;
            font-weight: bold;
            color: #00b0ff;
            margin: 20px 0;
            letter-spacing: 2px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
        .stat-box { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.9em; color: #aaaaaa; text-transform: uppercase; }
        .stat-value { font-size: 1.5em; font-weight: bold; color: #ffffff; }
        .status {
            margin-top: 20px;
            font-size: 0.8em;
            color: #888;
        }
        .error-margin { color: #ff5252; font-size: 1.2em; margin-top: 10px;}
    </style>
</head>
<body>

    <div class="container">
        <h1>ESP32 PI Approximation</h1>
        
        <div class="pi-value" id="piDisplay">Loading...</div>
        <div class="error-margin" id="errorDisplay">Error: --</div>

        <div class="stats">
            <div class="stat-box">
                <span class="stat-label">Total Throws</span>
                <span class="stat-value" id="throwsDisplay">--</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Total Hits</span>
                <span class="stat-value" id="hitsDisplay">--</span>
            </div>
        </div>
        <div class="status" id="statusDisplay">Waiting for data...</div>
    </div>

    <script>
        // --- YOUR UPSTASH DETAILS ---
        const endpoint = "https://awaited-hog-75158.upstash.io";
        const token = "gQAAAAAAASWWAAIncDFmZWRhYTM1MTJkZTA0MjZmYjU1ZmM0ZGIzYzBjMjA5ZnAxNzUxNTg"; 
        
        // We use MGET to fetch both keys in a single request!
        const fetchUrl = `${endpoint}/mget/total_hits/total_throws?_token=${token}`;

        async function fetchPiData() {
            try {
                document.getElementById('statusDisplay').innerText = "Fetching data...";
                
                const response = await fetch(fetchUrl);
                const data = await response.json();

                if (data.result && data.result.length === 2) {
                    // Upstash returns strings, we convert them to numbers
                    const hits = parseInt(data.result[0]);
                    const throws = parseInt(data.result[1]);

                    if (throws > 0) {
                        // The Magic Math
                        const calculatedPi = 4 * (hits / throws);
                        const actualPi = Math.PI;
                        const error = Math.abs(calculatedPi - actualPi);

                        // Update the Dashboard
                        document.getElementById('piDisplay').innerText = calculatedPi.toFixed(10);
                        document.getElementById('throwsDisplay').innerText = throws.toLocaleString();
                        document.getElementById('hitsDisplay').innerText = hits.toLocaleString();
                        
                        // Show how close we are to the real Pi
                        document.getElementById('errorDisplay').innerText = `Diff: ${error.toFixed(7)}`;
                        
                        const now = new Date();
                        document.getElementById('statusDisplay').innerText = `Last updated: ${now.toLocaleTimeString()}`;
                    }
                } else {
                    console.log("Waiting for initial data from ESP32...");
                }
            } catch (err) {
                console.error("Error fetching data:", err);
                document.getElementById('statusDisplay').innerText = "Connection error. Retrying...";
            }
        }

        // Fetch immediately on load
        fetchPiData();

        // Then fetch every 10 seconds (10000 ms)
        // 6 requests per minute = perfectly safe for your 500k monthly limit!
        setInterval(fetchPiData, 10000);
    </script>
</body>
</html>
